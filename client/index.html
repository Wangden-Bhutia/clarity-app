<!DOCTYPE html>
<html lang="en" style="height:100%; background:#F5F5F3;">
  <head>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Clarity</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F5F5F3" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Clarity - Decision Reflection" />
    <meta property="og:description" content="A calm space to think clearly and review your decisions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://83e27fbb.clarity-app-9q9.pages.dev/" />
    <meta property="og:site_name" content="Clarity" />
    <meta property="og:image" content="https://83e27fbb.clarity-app-9q9.pages.dev/preview.png?v=5" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clarity - Decision Reflection" />
    <meta name="twitter:description" content="A calm space to think clearly and review your decisions." />
    <meta name="twitter:image" content="https://83e27fbb.clarity-app-9q9.pages.dev/preview.png?v=5" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  </head>

  <body style="margin:0; background:#F5F5F3; min-height:100%;">
    <!-- Splash Screen -->
    <div id="splash-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F5F5F3;z-index:9999;transition:opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);">
      <img src="/icons/icon-512.png" alt="Clarity" style="width:84px;height:84px;opacity:0;transform:scale(0.96);filter:blur(2px);transition:opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), filter 0.6s cubic-bezier(0.22, 1, 0.36, 1);" id="splash-logo" />
    </div>

    <div id="root" style="min-height:100vh;"></div>

    <!-- Splash fade -->
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        const logo = document.getElementById('splash-logo');

        if (logo) {
          setTimeout(() => {
            requestAnimationFrame(() => {
              logo.style.opacity = '1';
              logo.style.transform = 'scale(1)';
              logo.style.filter = 'blur(0px)';
            });
          }, 80);
        }

        if (splash) {
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }, 250);
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
