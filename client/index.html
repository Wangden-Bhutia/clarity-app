    <link rel="manifest" href="/manifest.json" />

    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Clarity - Decision Reflection" />
    <meta property="og:description" content="A calm space to think clearly and review your decisions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://83e27fbb.clarity-app-9q9.pages.dev/" />
    <meta property="og:site_name" content="Clarity" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  </head>

  <body style="margin:0; background:#F5F5F3; min-height:100%;">
    <!-- Splash Screen -->
    <div id="splash-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#8FAE97;z-index:9999;transition:opacity 0.6s ease;">
      <div style="width:8px;height:8px;border-radius:9999px;background:#EAEDE8;opacity:0.9;"></div>
    </div>

    <div id="root" style="min-height:100vh;"></div>

    <!-- Splash fade -->
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 600);
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
